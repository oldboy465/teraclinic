{% extends 'base.html' %}

{% block page_title %}{{ 'Editar Terapeuta' if professor else 'Novo Terapeuta' }}{% endblock %}

{% block content %}
<div class="form-container">
    <form action="{{ '/professores/editar/' ~ professor.id if professor else '/professores/novo' }}" method="POST" enctype="multipart/form-data" class="form-grid">
        
        <div class="form-group full-width">
            <label for="nome_completo">Nome Completo *</label>
            <input type="text" id="nome_completo" name="nome_completo" value="{{ professor.nome_completo if professor else '' }}" required class="input-suave">
        </div>

        <div class="form-group">
            <label for="telefone">Telefone (WhatsApp)</label>
            <input type="tel" id="telefone" name="telefone" value="{{ professor.telefone if professor else '' }}" placeholder="Ex: 98 90000-0000" class="input-suave telefone-input">
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" value="{{ professor.email if professor else '' }}" placeholder="exemplo@clinica.com" class="input-suave">
        </div>

        <div class="form-group full-width">
            <label for="foto">Foto do Perfil (Max 2MB)</label>
            <input type="file" id="foto" name="foto" accept=".jpg, .jpeg, .png, .webp" class="input-suave file-input">
            {% if professor and professor.foto %}
                <p class="file-help">Arquivo atual: {{ professor.foto }}</p>
            {% endif %}
        </div>

        <div class="form-actions full-width">
            <a href="/professores" class="btn-secondary">Cancelar</a>
            <button type="submit" class="btn-primary">Salvar Terapeuta</button>
        </div>
    </form>
</div>
{% endblock %}
