{% extends 'base.html' %}

{% block page_title %}{{ 'Editar Aluno' if aluno else 'Novo Aluno' }}{% endblock %}

{% block content %}
<div class="form-container">
    <form action="{{ '/alunos/editar/' ~ aluno.id if aluno else '/alunos/novo' }}" method="POST" enctype="multipart/form-data" class="form-grid">
        
        <div class="form-group full-width">
            <label for="nome">Nome Completo do Aluno *</label>
            <input type="text" id="nome" name="nome" value="{{ aluno.nome if aluno else '' }}" required class="input-suave">
        </div>

        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento</label>
            <input type="date" id="data_nascimento" name="data_nascimento" value="{{ aluno.data_nascimento if aluno else '' }}" class="input-suave">
        </div>

        <div class="form-group">
            <label for="sexo">Sexo biológico</label>
            <select id="sexo" name="sexo" class="input-suave">
                <option value="Masculino" {% if aluno and aluno.sexo == 'Masculino' %}selected{% endif %}>Masculino</option>
                <option value="Feminino" {% if aluno and aluno.sexo == 'Feminino' %}selected{% endif %}>Feminino</option>
                <option value="Outro" {% if aluno and aluno.sexo == 'Outro' %}selected{% endif %}>Outro</option>
            </select>
        </div>

        <div class="form-group">
            <label for="terapeuta_id">Terapeuta/Professor Responsável</label>
            <select id="terapeuta_id" name="terapeuta_id" class="input-suave">
                <option value="">Selecione um terapeuta</option>
                {% for prof in terapeutas %}
                    <option value="{{ prof.id }}" {% if aluno and aluno.terapeuta_id == prof.id %}selected{% endif %}>
                        {{ prof.nome_completo }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group full-width">
            <label for="foto">Foto do Aluno (Max 2MB)</label>
            <input type="file" id="foto" name="foto" accept=".jpg, .jpeg, .png, .webp" class="input-suave file-input">
            {% if aluno and aluno.foto %}
                <p class="file-help">Arquivo atual: {{ aluno.foto }}</p>
            {% endif %}
        </div>

        <div class="form-group full-width">
            <label for="preferencias">Preferências e Reforçadores (O que a criança gosta)</label>
            <textarea id="preferencias" name="preferencias" rows="4" maxlength="5000" class="input-suave">{{ aluno.preferencias if aluno else '' }}</textarea>
        </div>

        <div class="form-group full-width">
            <label for="evitaveis">Evitáveis e Gatilhos (O que deve ser evitado)</label>
            <textarea id="evitaveis" name="evitaveis" rows="4" maxlength="5000" class="input-suave">{{ aluno.evitaveis if aluno else '' }}</textarea>
        </div>

        <div class="form-group full-width">
            <label for="informacoes_adicionais">Informações Médicas / Adicionais</label>
            <textarea id="informacoes_adicionais" name="informacoes_adicionais" rows="3" class="input-suave">{{ aluno.informacoes_adicionais if aluno else '' }}</textarea>
        </div>

        <div class="form-actions full-width">
            <a href="/alunos" class="btn-secondary">Cancelar</a>
            <button type="submit" class="btn-primary">Salvar Aluno</button>
        </div>
    </form>
</div>
{% endblock %}
